name: YouTube Shorts to Instagram Reels

on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "테스트 실행(인스타에 실제 발행하지 않음)"
        required: false
        default: "0"

permissions:
  contents: write

concurrency:
  group: yt2ig
  cancel-in-progress: false

jobs:
  repost:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install yt-dlp + ffmpeg
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Write YouTube cookies
        env:
          YT_COOKIES: ${{ secrets.YT_COOKIES }}
        run: |
          if [ -n "$YT_COOKIES" ]; then
            printf '%s\n' "$YT_COOKIES" > cookies.txt
            echo "cookies written ($(wc -l < cookies.txt) lines)"
          else
            echo "no cookies secret"
          fi

      - name: Run reposter
        env:
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          YT_CHANNEL_ID: ${{ secrets.YT_CHANNEL_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COOKIES_FILE: cookies.txt
          MAX_PER_RUN: "1"
          SHORT_MAX_SECONDS: "185"
          CAPTION_TEMPLATE: "{title}"
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: python main.py

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain posted.json)" ]; then
            git add posted.json
            git commit -m "chore: update posted.json [skip ci]"
            git push
          else
            echo "no state change"
          fi
